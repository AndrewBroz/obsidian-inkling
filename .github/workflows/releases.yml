name: Build obsidian plugin

on:
  push:
    tags:
      # Version tags only. Previously "*", which meant ANY tag — including a
      # throwaway or diagnostic one — would build and publish a release that
      # BRAT users would then be offered as "Latest".
      - "[0-9]+.[0-9]+.[0-9]+*"
  # Manual fallback: gh workflow run releases.yml --ref <tag>
  #
  # NOTE: This trigger is NOT broken, despite what releases 0.7.1-0.9.0 suggested.
  # GitHub silently skips workflow runs for every tag when more than three tags are
  # pushed at once. Those releases were pushed with `git push --follow-tags`, which
  # dragged a backlog of never-pushed annotated tags along with the new one, tripped
  # that limit, and took the release build down with it — with no error anywhere.
  # Push the version tag on its own (`git push origin <tag>`) and this fires normally.
  # Verified by experiment 2026-07-13: 1 tag => runs; 4 tags at once => nothing runs.
  workflow_dispatch:

env:
  PLUGIN_NAME: inkling

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Build plugin
        run: |
          bun install --frozen-lockfile
          bun run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' "$PREV_TAG..${GITHUB_REF_NAME}" > release_notes.md
          else
            git log -n 50 --pretty=format:'- %s' "${GITHUB_REF_NAME}" > release_notes.md
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
            styles.css
