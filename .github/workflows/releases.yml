name: Build obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: commentator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Build plugin
        run: |
          bun install --frozen-lockfile
          bun run build
          mkdir ${{ env.PLUGIN_NAME }}
          cp main.js manifest.json styles.css ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}
      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' "$PREV_TAG..${GITHUB_REF_NAME}" > release_notes.md
          else
            git log --pretty=format:'- %s' "${GITHUB_REF_NAME}" > release_notes.md
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
            styles.css
